name: Publish to npm

# Publishes on a version tag, e.g.  git tag v0.2.1 && git push origin v0.2.1
#
# ONE-TIME SETUP (no secrets needed, OIDC trusted publishing):
#   1. npm: account → Packages → capybaraa → Settings → Trusted Publisher
#      Add GitHub Actions: repo katipally/capybaraa, workflow publish.yml.
#   2. That's it. The job below mints a short-lived token via OIDC at publish time.
# Requires npm >= 11.5.1 (provided by Node 22 / setup-node). See RELEASING.md.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org/

      # Fail fast if the tag and package.json disagree, so we never publish a
      # version nobody asked for.
      - name: Tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag != package.json $pkg"; exit 1
          fi

      - run: npm test
      - run: npm publish --provenance --access public

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
